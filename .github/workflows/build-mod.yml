name: Build mod package

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Build ShareTheSpire2.zip
    runs-on: [self-hosted, Windows]
    env:
      DOTNET_INSTALL_DIR: ${{ runner.temp }}\dotnet
      STS2_PATH: ${{ vars.STS2_PATH }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Build and package
        shell: pwsh
        run: |
          $arguments = @(
            '.\ShareTheSpire2.csproj',
            '-c',
            'Release',
            '-t:PackageMod'
          )

          if ($env:STS2_PATH) {
            $arguments += "-p:Sts2Path=$env:STS2_PATH"
          }

          dotnet build @arguments

      - name: Upload ShareTheSpire2.zip
        uses: actions/upload-artifact@v4
        with:
          name: ShareTheSpire2
          path: artifacts/ShareTheSpire2.zip
          if-no-files-found: error

      - name: Attach ShareTheSpire2.zip to release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/ShareTheSpire2.zip
